<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KHL — Bubble Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --paper:#FAFAF6; --paper-deep:#F1F1EC; --ink:#2A241C;
      --ink-soft:#6B6051; --rule:#DDDCD2; --accent:#7A2E1F;
    }
    *{box-sizing:border-box;}
    body{
      margin:0; background:var(--paper); color:var(--ink);
      font-family:'Source Serif 4', serif;
      display:flex; flex-direction:column; align-items:center;
      padding:40px 20px;
    }
    h1{font-family:'Fraunces',serif; font-weight:600; font-size:22px; margin:0 0 4px;}
    .note{font-family:'Space Mono',monospace; font-size:11px; color:var(--ink-soft); margin:0 0 20px; text-align:center;}

    /* same boxed look as the journal heatmap card */
    .tagcloud-wrap{
      width:100%; max-width:680px;
      padding:16px 18px 14px;
      background:var(--paper-deep);
      border:1px solid var(--rule); border-radius:3px;
    }
    .cap{
      font-family:'Space Mono',monospace; font-size:11px;
      letter-spacing:0.06em; text-transform:uppercase;
      color:var(--ink-soft); margin:0 0 12px;
      display:flex; justify-content:space-between; align-items:center;
    }
    .cap button{
      font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.06em;
      text-transform:uppercase; color:var(--ink-soft);
      background:none; border:1px solid var(--rule); border-radius:2px;
      padding:3px 9px; cursor:pointer;
    }
    .cap button:hover{color:var(--ink); border-color:var(--ink-soft);}

    .tagcloud{
      position:relative; height:360px; overflow:hidden;
      background:var(--paper);
      border:1px solid var(--rule); border-radius:3px;
      touch-action:none;
    }
    .tc-bubble{
      position:absolute; top:0; left:0;
      display:flex; align-items:center; justify-content:center; text-align:center;
      font-family:'Space Mono',monospace; font-size:9.5px;
      letter-spacing:0.04em; text-transform:uppercase; line-height:1.3;
      color:var(--ink); padding:0 10px;
      cursor:grab; user-select:none; -webkit-user-select:none;
      touch-action:none; will-change:transform;
    }
    .tc-bubble:active{cursor:grabbing;}
    .tc-bubble.hot{font-weight:700; font-size:10px;}
    /* the fuzzy sprayed ring lives on ::before so the label stays crisp */
    .tc-bubble::before{
      content:''; position:absolute; inset:-14%;
      border-radius:50%;
      background:radial-gradient(circle at 50% 50%,
        transparent 40%,
        rgba(42,36,28,0.46) 51%,
        rgba(42,36,28,0.30) 60%,
        rgba(42,36,28,0.15) 69%,
        rgba(42,36,28,0.05) 79%,
        transparent 89%);
      filter:var(--fuzz, url(#fuzz0));
      z-index:-1;
    }
    .tc-bubble.hot::before{
      background:radial-gradient(circle at 50% 50%,
        transparent 38%,
        rgba(42,36,28,0.62) 50%,
        rgba(42,36,28,0.42) 60%,
        rgba(42,36,28,0.22) 70%,
        rgba(42,36,28,0.08) 80%,
        transparent 90%);
    }
  </style>
</head>
<body>

  <h1>Bubble prototype</h1>
  <p class="note">spray-paint edges · monochrome · pour-from-source then float · drag to toss</p>

  <div class="tagcloud-wrap">
    <div class="cap"><span id="tc-caption">Explore by field</span><button id="replay">↻ Replay drop</button></div>
    <div class="tagcloud" id="tagcloud"></div>
  </div>

  <!-- fuzzy spray filters: a few seeds so no two bubbles look identical -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <filter id="fuzz0" x="-30%" y="-30%" width="160%" height="160%">
        <feTurbulence type="fractalNoise" baseFrequency="0.34" numOctaves="2" seed="7" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="9" xChannelSelector="R" yChannelSelector="G"/>
        <feGaussianBlur stdDeviation="0.4"/>
      </filter>
      <filter id="fuzz1" x="-30%" y="-30%" width="160%" height="160%">
        <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="2" seed="21" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G"/>
        <feGaussianBlur stdDeviation="0.5"/>
      </filter>
      <filter id="fuzz2" x="-30%" y="-30%" width="160%" height="160%">
        <feTurbulence type="fractalNoise" baseFrequency="0.28" numOctaves="3" seed="41" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="11" xChannelSelector="R" yChannelSelector="G"/>
        <feGaussianBlur stdDeviation="0.4"/>
      </filter>
      <filter id="fuzz3" x="-30%" y="-30%" width="160%" height="160%">
        <feTurbulence type="fractalNoise" baseFrequency="0.42" numOctaves="2" seed="63" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="8" xChannelSelector="R" yChannelSelector="G"/>
        <feGaussianBlur stdDeviation="0.45"/>
      </filter>
    </defs>
  </svg>

  <script>
  (function(){
    const arena = document.getElementById('tagcloud');

    // ---- fields, mimicking projects.html .kind labels (split on "x") ----
    const KINDS = ['Data Analytics','Agentic AI','Finance','AI x Philosophy',
                   'Front-End Development','iOS App Development','AI Economy'];
    const fields = new Map();
    KINDS.forEach(k => k.split(/\s+[x×]\s+/i).forEach(part => {
      const name = part.trim(); if(!name) return;
      const key = name.toLowerCase();
      if(!fields.has(key)) fields.set(key,{name,count:0});
      fields.get(key).count++;
    }));

    const bubbles = [];
    const W = () => arena.clientWidth, H = () => arena.clientHeight;

    let i = 0;
    fields.forEach(f => {
      const hot = f.count > 1;
      const base = Math.min(120, Math.max(62, 38 + f.name.length * 2.4));
      const d = Math.round(base * (1 + 0.28 * Math.min(f.count - 1, 2)));
      const el = document.createElement('div');
      el.className = 'tc-bubble' + (hot ? ' hot' : '');
      el.textContent = f.name;
      el.style.width = el.style.height = d + 'px';
      el.style.setProperty('--fuzz', 'url(#fuzz' + (i % 4) + ')');
      arena.appendChild(el);

      const b = {
        el, r:d/2, active:false,
        emit: 140 + i * 190,            // staggered pour from the source
        x:0, y:0, vx:0, vy:0,
        ph: Math.random() * Math.PI * 2, // drift phase (dandelion sway)
        dragId:null, dragMoved:0, lastX:0, lastY:0,
      };
      bubbles.push(b);
      i++;

      // drag to toss
      el.addEventListener('pointerdown', e => {
        if(e.pointerType==='mouse' && e.button!==0) return;
        el.setPointerCapture(e.pointerId);
        b.dragId=e.pointerId; b.dragMoved=0; b.lastX=e.clientX; b.lastY=e.clientY;
        e.preventDefault();
      });
      el.addEventListener('pointermove', e => {
        if(b.dragId!==e.pointerId) return;
        const dx=e.clientX-b.lastX, dy=e.clientY-b.lastY;
        b.lastX=e.clientX; b.lastY=e.clientY;
        b.x+=dx; b.y+=dy; b.vx=dx*0.4; b.vy=dy*0.4;
        b.dragMoved+=Math.abs(dx)+Math.abs(dy);
      });
      const drop = e => { if(b.dragId===e.pointerId) b.dragId=null; };
      el.addEventListener('pointerup', drop);
      el.addEventListener('pointercancel', drop);
    });

    // ---- animation phases: 'drop' (gravity from a source) then 'float' ----
    let mode = 'drop', t0 = performance.now(), floated = false;
    const G = 0.45, DROP_MS = 2700;

    function start(){
      mode='drop'; floated=false; t0=performance.now();
      const src = {x: W()/2, y: -30};
      bubbles.forEach(b => {
        b.active=false;
        b.x=src.x; b.y=src.y; b.vx=0; b.vy=0;
        b.el.style.opacity='0';
      });
    }

    function toFloat(){
      mode='float'; floated=true;
      // dandelion lift-off: each seed springs up off the floor, then drifts
      bubbles.forEach(b => {
        b.vy = -(1.4 + Math.random()*2.2);
        b.vx = (Math.random()-0.5) * 1.6;
      });
    }

    function frame(now){
      const t = now - t0;
      const w = W(), h = H();
      const src = {x: w/2, y: -30};

      if(mode==='drop' && t > DROP_MS) toFloat();

      for(const b of bubbles){
        if(!b.active){
          if(t >= b.emit){ b.active=true; b.el.style.opacity='1';
            b.x=src.x + (Math.random()-0.5)*8; b.y=src.y;
            b.vx=(Math.random()-0.5)*1.2; b.vy=1.5 + Math.random()*1.2; }
          else { b.el.style.transform='translate('+(src.x-b.r)+'px,'+(src.y-b.r)+'px)'; continue; }
        }

        if(b.dragId===null){
          if(mode==='drop'){
            b.vy += G;                       // gravity pour
            b.vx *= 0.995; b.vy *= 0.995;
          } else {
            // gentle dandelion drift: slow sway + faint random breeze
            b.vx += Math.sin(now*0.0006 + b.ph)*0.006 + (Math.random()-0.5)*0.02;
            b.vy += Math.cos(now*0.0005 + b.ph)*0.006 + (Math.random()-0.5)*0.02;
            b.vx *= 0.99; b.vy *= 0.99;
            const sp=Math.hypot(b.vx,b.vy), cap=0.42;
            if(sp>cap){ b.vx=b.vx/sp*cap; b.vy=b.vy/sp*cap; }
          }
          b.x += b.vx; b.y += b.vy;
        }

        // walls: floor bounces during drop; all sides soft during float
        const r=b.r;
        if(b.x<r){ b.x=r; b.vx=Math.abs(b.vx)*0.6; }
        if(b.x>w-r){ b.x=w-r; b.vx=-Math.abs(b.vx)*0.6; }
        if(b.y>h-r){ b.y=h-r; b.vy=-Math.abs(b.vy)*(mode==='drop'?0.45:0.6); }
        if(b.y<r && mode==='float'){ b.y=r; b.vy=Math.abs(b.vy)*0.6; }
      }

      // soft separation so they never overlap
      for(let a=0;a<bubbles.length;a++) for(let c=a+1;c<bubbles.length;c++){
        const p=bubbles[a], q=bubbles[c];
        if(!p.active||!q.active) continue;
        const dx=q.x-p.x, dy=q.y-p.y, min=p.r+q.r+2, dist=Math.hypot(dx,dy)||0.001;
        if(dist<min){
          const push=(min-dist)/2, nx=dx/dist, ny=dy/dist;
          if(p.dragId===null){ p.x-=nx*push; p.y-=ny*push; p.vx-=nx*0.05; p.vy-=ny*0.05; }
          if(q.dragId===null){ q.x+=nx*push; q.y+=ny*push; q.vx+=nx*0.05; q.vy+=ny*0.05; }
        }
      }

      for(const b of bubbles)
        if(b.active) b.el.style.transform='translate('+(b.x-b.r)+'px,'+(b.y-b.r)+'px)';

      requestAnimationFrame(frame);
    }

    document.getElementById('tc-caption').textContent =
      fields.size + ' fields across ' + KINDS.length + ' projects';
    document.getElementById('replay').addEventListener('click', start);

    start();
    requestAnimationFrame(frame);
  })();
  </script>

</body>
</html>
